<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Reset Prompt Muse Cache</title><style>body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:#0b1020;color:#f8fafc;margin:0;padding:24px}button,a{font:inherit;padding:14px 18px;margin:8px 0;border-radius:12px;border:1px solid #64748b;background:#1f2937;color:#fff;display:block;text-decoration:none}pre{white-space:pre-wrap;background:#020617;padding:12px;border-radius:12px;border:1px solid #334155}</style></head><body><h1>Reset Prompt Muse cache</h1><p>This removes service workers, browser caches, and v12/v13 local library data for this domain.</p><button id="reset">Reset this site cache</button><a href="index.html">Open app</a><pre id="log">Ready.</pre><script>function log(s){document.getElementById('log').textContent+='\n'+s}document.getElementById('reset').onclick=async function(){try{if(navigator.serviceWorker){let regs=await navigator.serviceWorker.getRegistrations();for(const r of regs){await r.unregister();log('unregistered service worker')}}if(window.caches){let keys=await caches.keys();for(const k of keys){await caches.delete(k);log('deleted cache '+k)}}try{localStorage.removeItem('promptMuseV13Library');localStorage.removeItem('promptMuseV12Library');log('cleared local prompt libraries')}catch(e){log('localStorage blocked: '+e.message)}log('Done. Refresh, then open index.html.')}catch(e){log('ERROR: '+(e.stack||e.message||e))}}</script></body></html>
